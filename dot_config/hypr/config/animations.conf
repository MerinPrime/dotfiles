# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = yes

    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 5.5, md3_decel, popin 85%
    animation = windowsOut, 1, 4, md3_accel, popin 85%
    animation = windowsMove, 1, 5.5, md3_decel

    animation = border, 1, 10, default
    animation = fade, 1, 4, md3_decel

    animation = workspaces, 1, 5.5, md3_decel, slidefade 15%
    animation = specialWorkspace, 1, 5.5, md3_decel, slidefadevert 15%
}

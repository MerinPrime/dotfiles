# ┃                      Input Configuration                    ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

input {
    follow_mouse = 2
    float_switch_override_focus = 2
    accel_profile = flat
    sensitivity = -0.7
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle
}

cursor {
    persistent_warps = 1
    warp_on_change_workspace = 1
}

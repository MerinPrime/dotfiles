# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hyprland.org/Configuring/Window-Rules/ #
windowrule {
  name = windowrule-3
  float = on
  match:class = ^()$
  match:title = ^(Picture in picture)$
}

windowrule {
  name = windowrule-4
  float = on
  match:class = ^()$
  match:title = ^(Save File)$
}

windowrule {
  name = windowrule-5
  float = on
  match:class = ^()$
  match:title = ^(Open File)$
}

windowrule {
  name = windowrule-2
  float = on
  workspace = special:essential
  match:class = ^(com.saivert.pwvucontrol)
}

windowrule {
  name = windowrule-6
  float = on
  workspace = special:essential
  match:title = ^(AmneziaVPN)$
}

windowrule {
  name = windowrule-7
  float = on
  size = 1000 600
  workspace = special:essential
  match:class = ^(io.github.kaii_lb.Overskride)$
}

windowrule {
  name = windowrule-8
  float = on
  match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
}

windowrule {
  name = windowrule-9
  float = on
  center = on
  dim_around = on
  opacity = 0.8
  stay_focused = on
  match:class = ^(polkit-mate-authentication-agent-1)(.*)$
}

windowrule {
  name = windowrule-11
  float = on
  match:class = ^()$
  match:title = ^(Steam - Self Updater)$
}

# Increase the opacity
windowrule {
  name = windowrule-12
  opacity = 0.85
  match:class = ^(org.gnome.Nautilus)$
}

windowrule {
  name = windowrule-13
  opacity = 0.96
  match:class = ^(discord)$
}

windowrule {
  name = windowrule-14
  opacity = 0.96
  match:class = ^(org.telegram.desktop)$
}

# General window rules
windowrule {
  name = windowrule-16
  float = on
  size = 960 540
  match:title = ^(Picture-in-Picture)$
}

# Decorations related to tiling windows on workspaces 1 to 10
windowrule {
  name = windowrule-25
  float = on
  center = on
  no_max_size = on
  border_size = 0
  no_shadow = on
  dim_around = on
  opacity = 0.95
  pin = on
  stay_focused = on
  match:class = ^(org.gnome.NautilusPreviewer)$
}

windowrule {
  name = discord-scratchpad
  match:class = ^(discord)$
  workspace = special:messaging silent
}

windowrule {
  name = telegram-scratchpad
  match:class = ^(org.telegram.desktop)$
  workspace = special:messaging silent
}

# Windows Rules End #

# Workspaces Rules https://wiki.hyprland.org/Configuring/Workspace-Rules/ #

# Workspaces Rules End #

# Layers Rules #
layerrule {
  name = layerrule-1
  dim_around = on
  blur = on
  ignore_alpha = 0.0
  match:namespace = wofi
}

layerrule {
  name = layerrule-2
  animation = slide top
  match:namespace = logout_dialog
}

layerrule {
  name = layerrule-3
  animation = no
  blur = on
  ignore_alpha = 0.0
  match:namespace = waybar
}

layerrule {
  name = layerrule-4
  animation = fade 50%
  match:namespace = wallpaper
}

layerrule {
  name = layerrule-5
  animation = fade
  blur = on
  ignore_alpha = 0.0
  match:namespace = notifications
}

# Layers Rules End #

